name: Build & Publish Desktop App

# This workflow is gated by the repository variable ENABLE_DESKTOP_BUILD.
# - Push events only trigger the build when ENABLE_DESKTOP_BUILD == "true".
# - Manual workflow_dispatch always runs (for one-off testing / releases).
# To toggle: Settings → Secrets and variables → Actions → Variables tab →
# add or edit "ENABLE_DESKTOP_BUILD" and set to "true" to enable auto-builds,
# any other value (or remove it) to disable.

on:
  push:
    branches:
      - main
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22.x'
  S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
  S3_REGION: ${{ secrets.AWS_S3_REGION }}

jobs:
  build:
    if: vars.ENABLE_DESKTOP_BUILD == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('desktop/package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Build & package (Windows)
        if: matrix.platform == 'win'
        run: npm run build && npx electron-builder --win --publish never
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Build & package (macOS)
        if: matrix.platform == 'mac'
        run: npm run build && npx electron-builder --mac --publish never
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Verify build output (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          INSTALLER=$(ls release/*.exe 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No .exe installer found in release/"
            exit 1
          fi
          SIZE=$(stat --printf="%s" "$INSTALLER" 2>/dev/null || stat -f%z "$INSTALLER")
          echo "Installer: $INSTALLER ($SIZE bytes)"
          if [ "$SIZE" -lt 52428800 ]; then
            echo "ERROR: Installer is smaller than 50MB — likely corrupted"
            exit 1
          fi

      - name: Verify build output (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          INSTALLER=$(ls release/*.dmg 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No .dmg installer found in release/"
            exit 1
          fi
          SIZE=$(stat -f%z "$INSTALLER" 2>/dev/null || stat --printf="%s" "$INSTALLER")
          echo "Installer: $INSTALLER ($SIZE bytes)"
          if [ "$SIZE" -lt 52428800 ]; then
            echo "ERROR: Installer is smaller than 50MB — likely corrupted"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Upload to S3 (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          aws s3 cp release/ s3://$S3_BUCKET/desktop-releases/v${VERSION}/ \
            --recursive \
            --exclude "*" \
            --include "*.exe" \
            --include "*.zip" \
            --include "*.yml" \
            --include "*.blockmap"

      - name: Upload to S3 (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.version }}
          aws s3 cp release/ s3://$S3_BUCKET/desktop-releases/v${VERSION}/ \
            --recursive \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.yml" \
            --include "*.blockmap"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.platform }}
          path: |
            desktop/release/*.exe
            desktop/release/*.dmg
            desktop/release/*.zip
            desktop/release/*.yml
            desktop/release/*.blockmap
          if-no-files-found: warn

  notify:
    name: Notify employees
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION=$(node -e "console.log(require('./desktop/package.json').version)")
          echo "version=$APP_VERSION" >> $GITHUB_OUTPUT

      - name: Send update email to all employees
        shell: bash
        env:
          API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          API_KEY: ${{ secrets.DEPLOY_API_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${API_BASE_URL}/downloads/notify/v${VERSION}" \
            -H "x-api-key: ${API_KEY}" \
            -H "Content-Type: application/json")
          echo "Backend responded with: ${RESPONSE}"
          if [ "${RESPONSE}" != "201" ] && [ "${RESPONSE}" != "200" ]; then
            echo "Warning: Failed to send notification emails (HTTP ${RESPONSE})"
          fi

  cleanup:
    name: Cleanup old S3 releases
    needs: [build, notify]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      - name: Keep only latest 3 versions
        shell: bash
        run: |
          BUCKET="${{ secrets.AWS_S3_BUCKET }}"
          PREFIX="desktop-releases/"
          KEEP=3

          # List all version folders, sort by semver descending
          VERSIONS=$(aws s3 ls "s3://${BUCKET}/${PREFIX}" \
            | awk '{print $2}' \
            | sed 's|/||' \
            | sed 's/^v//' \
            | sort -t. -k1,1nr -k2,2nr -k3,3nr \
            | sed 's/^/v/')

          echo "Found versions:"
          echo "$VERSIONS"

          # Skip the latest $KEEP, delete the rest
          COUNT=0
          for VERSION in $VERSIONS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt $KEEP ]; then
              echo "Deleting old release: ${VERSION}"
              aws s3 rm "s3://${BUCKET}/${PREFIX}${VERSION}/" --recursive
            else
              echo "Keeping: ${VERSION}"
            fi
          done

          echo "Cleanup complete. Kept latest ${KEEP} versions."

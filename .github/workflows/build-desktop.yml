name: Build Desktop App

on:
  push:
    branches:
      - main
    paths:
      - 'desktop/**'
  workflow_dispatch:

env:
  NODE_VERSION: '22.x'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        if: matrix.platform == 'win'
        run: npm run build && npx electron-builder --win --publish always
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & publish (macOS)
        if: matrix.platform == 'mac'
        run: npm run build && npx electron-builder --mac --publish always
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulse-${{ matrix.platform }}
          path: desktop/release/*
          if-no-files-found: warn

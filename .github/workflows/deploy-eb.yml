name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-eb.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  NODE_VERSION: '22.x'
  AWS_REGION: us-east-2

jobs:
  deploy:
    name: Deploy to Elastic Beanstalk
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy

          cp -r dist deploy/
          cp -r .platform deploy/
          cp -r .ebextensions deploy/
          cp -r scripts deploy/
          cp package*.json deploy/
          cp Procfile deploy/

          # Ensure shell scripts are executable on the server
          chmod +x deploy/scripts/*.sh 2>/dev/null || true

          cd deploy
          zip -r ../deploy.zip .
          cd ..

          echo "Deployment package created: deploy.zip"
          ls -lh deploy.zip
          echo "Scripts included:"
          ls -la scripts/ || echo "(none)"

      - name: Get timestamp
        id: timestamp
        run: echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload package to S3
        id: upload
        run: |
          S3_BUCKET="${{ secrets.EB_S3_BUCKET }}"
          S3_KEY="PulseTrack-backend-${{ steps.timestamp.outputs.timestamp }}.zip"

          aws s3 cp deploy.zip s3://${S3_BUCKET}/${S3_KEY} --region ${{ env.AWS_REGION }}
          aws s3 ls s3://${S3_BUCKET}/${S3_KEY} --region ${{ env.AWS_REGION }}

          echo "s3_key=${S3_KEY}" >> $GITHUB_OUTPUT
          echo "Uploaded to s3://${S3_BUCKET}/${S3_KEY}"

      - name: Create Elastic Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --version-label "PulseTrack-backend-${{ steps.timestamp.outputs.timestamp }}" \
            --description "Deploy from GitHub Actions - Commit: ${{ github.sha }}" \
            --source-bundle S3Bucket="${{ secrets.EB_S3_BUCKET }}",S3Key="${{ steps.upload.outputs.s3_key }}" \
            --region ${{ env.AWS_REGION }} \
            --auto-create-application

      - name: Deploy to Elastic Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --version-label "PulseTrack-backend-${{ steps.timestamp.outputs.timestamp }}" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          aws elasticbeanstalk wait environment-updated \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-name "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --region ${{ env.AWS_REGION }}

          echo "Deployment completed successfully!"

      - name: Get environment info
        if: success()
        run: |
          aws elasticbeanstalk describe-environments \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --environment-names "${{ secrets.EB_ENVIRONMENT_NAME }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'Environments[0].[EnvironmentName,Status,Health,CNAME]' \
            --output table

      - name: Cleanup old versions
        if: success()
        run: |
          echo "Cleaning up old application versions..."

          aws elasticbeanstalk describe-application-versions \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --region ${{ env.AWS_REGION }} \
            --query 'sort_by(ApplicationVersions, &DateCreated)[:-10].VersionLabel' \
            --output text | \
          xargs -n1 -I {} aws elasticbeanstalk delete-application-version \
            --application-name "${{ secrets.EB_APPLICATION_NAME }}" \
            --version-label {} \
            --region ${{ env.AWS_REGION }} \
            --delete-source-bundle || true

          echo "Cleanup completed"

  notify:
    name: Notify deployment status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Success Notification
        if: needs.deploy.result == 'success'
        run: |
          echo "✅ PulseTrack backend deployed successfully!"
          echo "Environment: ${{ secrets.EB_ENVIRONMENT_NAME }}"
          echo "Commit: ${{ github.sha }}"

      - name: Deployment Failure Notification
        if: needs.deploy.result == 'failure'
        run: |
          echo "❌ PulseTrack backend deployment failed!"
          echo "Check the logs for details"
          exit 1

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' http://localhost:3000 https://backend.codewyse.site; img-src 'self' data:;" />
    <title>Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        overflow: hidden;
        background: #0a0a0f;
        color: rgba(255, 255, 255, 0.92);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        scroll-behavior: smooth;
        min-width: 0;
      }

      #root { height: 100vh; min-width: 0; }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(124, 92, 252, 0.25);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(124, 92, 252, 0.45);
      }

      /* ── Keyframes ── */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 15px rgba(124, 92, 252, 0.15), 0 0 30px rgba(124, 92, 252, 0.05); }
        50% { box-shadow: 0 0 25px rgba(124, 92, 252, 0.3), 0 0 50px rgba(124, 92, 252, 0.1); }
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      @keyframes breathe {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.02); }
      }

      @keyframes ring-expand {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(2.2); opacity: 0; }
      }

      @keyframes dot-pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 6px 2px rgba(56, 239, 176, 0.5); }
        50% { opacity: 0.7; box-shadow: 0 0 12px 4px rgba(56, 239, 176, 0.3); }
      }

      @keyframes orb-drift {
        0%, 100% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(30px, -20px) scale(1.1); }
        50% { transform: translate(-10px, 20px) scale(0.95); }
        75% { transform: translate(-25px, -10px) scale(1.05); }
      }

      /* ── Utility classes ── */
      .glass-card {
        background: rgba(255, 255, 255, 0.04);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      .ai-gradient-text {
        background: linear-gradient(135deg, #7c5cfc 0%, #5b8def 50%, #38efb3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .pulse-ring {
        position: absolute;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid rgba(124, 92, 252, 0.4);
        animation: ring-expand 2s ease-out infinite;
      }

      .ai-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #38efb3;
        display: inline-block;
        animation: dot-pulse 2s ease-in-out infinite;
      }

      *:focus-visible {
        outline: 2px solid #7c5cfc;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
